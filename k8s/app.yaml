apiVersion: v1
kind: Namespace
metadata:
  name: observe-demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: observe-demo-app
  namespace: observe-demo
  labels:
    app: observe-demo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: observe-demo-app
  template:
    metadata:
      labels:
        app: observe-demo-app
    spec:
      containers:
        - name: app
          image: "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/observe-demo-app:latest"
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
          resources:
            requests:
              cpu: 128m
              memory: 128Mi
            limits:
              cpu: 256m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: observe-demo-app
  namespace: observe-demo
spec:
  selector:
    app: observe-demo-app
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
  type: NodePort
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: observe-demo-app
  namespace: observe-demo
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    alb.ingress.kubernetes.io/wafv2-acl-arn: "${WAF_WEB_ACL_ARN}"
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: observe-demo-app
                port:
                  number: 80
